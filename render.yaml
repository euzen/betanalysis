services:
  # Backend API service
  - type: web
    name: bet-tracker-api
    runtime: python
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 15
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: DATABASE_URL
        value: sqlite:///./bet_analysis.db
    # Note: Free tier has ephemeral disk - data resets on deploy/restart
    # For persistent data, upgrade to paid plan with Disk

  # Frontend static site
  - type: web
    name: bet-tracker
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: NODE_VERSION
        value: 20
    # SPA routing - serve index.html for all routes
    routes:
      - type: rewrite
        source: /api/*
        destination: https://bet-tracker-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
